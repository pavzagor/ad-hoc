<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cooking Artifacts</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #0b0b0b;
      color: #f8f1e7;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { max-width: 920px; margin: 0 auto; }
    h1 { font-size: clamp(32px, 7vw, 64px); line-height: 1; margin: 0 0 12px; }
    a { color: #f2b84b; }
    .card {
      border: 1px solid #332b21;
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0;
      background: #141210;
    }
    .meta { color: #b9a894; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>Cooking Artifacts</h1>
    <p><a href="./latest/">Open latest</a></p>
    <div id="list" class="meta">Loading...</div>
  </main>
  <script>
    fetch('./manifest.json', { cache: 'no-store' })
      .then((response) => response.json())
      .then((manifest) => {
        const list = document.getElementById('list');
        const artifacts = manifest.artifacts || [];
        if (!artifacts.length) {
          list.textContent = 'No artifacts yet.';
          return;
        }
        list.className = '';
        list.innerHTML = artifacts.map((item) => {
          const slug = String(item.slug || '').replace(/[^a-z0-9-]/g, '');
          const title = String(item.title || item.slug || 'Untitled');
          const date = String(item.deployed_at || '');
          return `<section class="card"><a href="./${slug}/">${title}</a><div class="meta">${date}</div></section>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('list').textContent = 'Could not load manifest.';
      });
  </script>
</body>
</html>
