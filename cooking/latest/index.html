<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Latest Cooking Artifact</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      background: #0b0b0b;
      color: #f8f1e7;
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { max-width: 760px; margin: 0 auto; }
    a { color: #f2b84b; }
  </style>
</head>
<body>
  <main>
    <p id="status">Opening latest cooking artifact...</p>
  </main>
  <script>
    fetch('../manifest.json', { cache: 'no-store' })
      .then((response) => response.json())
      .then((manifest) => {
        const latest = manifest.latest;
        if (!latest) {
          document.getElementById('status').textContent = 'No latest artifact yet.';
          return;
        }
        location.replace(`../${latest}/`);
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Could not load manifest.';
      });
  </script>
</body>
</html>
